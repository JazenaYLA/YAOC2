version: "3.8"

services:
  n8n-brain:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-brain-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_brain
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      WEBHOOK_URL: ${BRAIN_WEBHOOK_URL}
      GENERIC_TIMEZONE: America/Chicago
      TZ: America/Chicago
      # Gateway connection
      GATEWAY_WEBHOOK_URL: ${GATEWAY_WEBHOOK_URL}
      GATEWAY_WEBHOOK_SECRET: ${GATEWAY_WEBHOOK_SECRET}
    depends_on:
      n8n-brain-postgres:
        condition: service_healthy
    volumes:
      - n8n-brain-data:/home/node/.n8n
    networks:
      - yaoc2-brain-net

  n8n-brain-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n_brain
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - n8n-brain-postgres-data:/var/lib/postgresql/data
    networks:
      - yaoc2-brain-net

volumes:
  n8n-brain-data:
  n8n-brain-postgres-data:

networks:
  yaoc2-brain-net:
    driver: bridge
